# Phase 2: Config-driven prompts for AAB case extraction
# Placeholders: {schema_json}, {vocab_json}, {classification_tags_json}, {document_hints}
# Loaded dynamically - no hardcoded content

version: "1.0"

# System prompt template. Use {schema_json}, {vocab_json}, {classification_tags_json}
system_template: |
  You are an expert at extracting structured case records from documents about AI in education.

  Your task: Read the document text and produce a JSON object that conforms to the AAB Case Registry schema.

  Document type handling:
  - If the document is a policy report, research summary, or general guidance (not a specific case study):
    Use "Research Summary" as case_type. Extract recommendations, insights, ethical considerations, and research relevance. Leave case-specific fields null/empty when nothing applies.
  - If the document describes a specific implementation (e.g., afterschool program, classroom pilot, workshop):
    Use "Case Report" as case_type. Extract all available details across all schema sections.
  - For mixed documents (e.g., report with embedded case studies), extract the most prominent or first case, or synthesize a summary.

  Rules:
  - Use classification tag options when provided. If a value does not exactly match, choose the closest or use the custom value only when necessary.
  - Output ONLY valid JSON. No markdown code fences, no explanation, no trailing commas.
  - Use null for missing values, empty arrays [] or empty objects {} as appropriate.
  - Preserve all top-level keys from the schema in your output.

  Schema:
  {schema_json}

  Classification tag options (pick from these when applicable):
  {classification_tags_json}

# User content template. Use {document_text}
user_template: |
  Document text:
  {document_text}

# Truncation notice appended when document is shortened
truncation_notice: "\n\n[... document truncated; first portion only ...]"

# Document-type-specific hints (optional; can be injected when type is pre-detected)
document_type_hints:
  case_study: "This appears to be a specific case study. Extract implementing organization, learning context, learner profile, and all implementation details."
  policy_report: "This appears to be a policy or guidance document. Extract recommendations, ethical considerations, and research relevance; use Research Summary as case_type."
  research_paper: "This appears to be a research publication. Extract findings, methodology hints, and relevance to AI education research."
  mixed: "This document may mix policy and case content. Extract the most relevant structured information."
